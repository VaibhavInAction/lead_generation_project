<!DOCTYPE html>
<!-- Realistic public LinkedIn "hiring" post (logged out), modeled on the leads we
     captured: og:title is the POST BODY (the bug), while og:description carries
     "<Author> on LinkedIn: <body>" and JSON-LD carries datePublished. -->
<html lang="en">
<head>
  <title>Paul McCarron on LinkedIn: We're hiring! | 12 comments</title>
  <meta property="og:title"
        content="We're hiring! We're looking for a Marketing Manager to join our growing team in Denver." />
  <meta property="og:description"
        content="Paul McCarron on LinkedIn: We're hiring! We're looking for a Marketing Manager to join our growing team in Denver. Apply now! | 12 comments" />
  <meta property="og:type" content="article" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "DiscussionForumPosting",
    "datePublished": "2026-07-11T14:22:00.000Z",
    "author": {"@type": "Person", "name": "Paul McCarron"}
  }
  </script>
</head>
<body>
  <main>
    <article>
      <a href="https://www.linkedin.com/in/paul-mccarron-79785053">Paul McCarron</a>
      <div class="post-body">
        We're hiring! We're looking for a Marketing Manager to join our growing team in Denver. Apply now!
      </div>
    </article>
  </main>
</body>
</html>

<!DOCTYPE html>
<!-- Public post whose og:description is just the post body (no "on LinkedIn" prefix),
     so the author must come from the URL slug. No timestamp present -> posted_at NULL. -->
<html lang="en">
<head>
  <title>LinkedIn</title>
  <meta property="og:title"
        content="Looking for a marketing/growth advisor for SUM Consulting" />
  <meta property="og:description"
        content="Looking for a marketing/growth advisor for SUM Consulting. DM me if you can help our startup scale." />
  <meta property="og:type" content="article" />
</head>
<body>
  <main>
    <article>
      <div class="post-body">
        Looking for a marketing/growth advisor for SUM Consulting. DM me if you can help our startup scale.
      </div>
    </article>
  </main>
</body>
</html>

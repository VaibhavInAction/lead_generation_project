# Intent-mining phrase templates (README §13.1).
#
# Phrases live in config, not code: adding a niche means adding phrases, not
# editing Python. `{need}` is substituted with each service from needs.yaml
# (or the CLI --need value). Each template becomes one search-engine query, so
# templates x needs = searches per batch — keep this list lean.
#
# Tuned from live results: quoted phrases match as substrings of longer posts,
# so "looking for a {need}" already catches "we are looking for a…" and
# "I'm looking for a…" — no need for separate person variants. Recommendation
# phrasings ("can anyone recommend…") almost never surface in search indexes
# but are kept once because when they DO hit, the intent is red-hot.
templates:
  - 'site:linkedin.com/posts "looking for a {need}"'
  - 'site:linkedin.com/posts "searching for a {need}"'
  - 'site:linkedin.com/posts "we need a {need}"'
  - 'site:linkedin.com/posts "in need of a {need}"'
  - 'site:linkedin.com/posts "looking to hire a {need}"'
  - 'site:linkedin.com/posts "can anyone recommend a {need}"'

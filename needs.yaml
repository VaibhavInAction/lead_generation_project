# needs.yaml — the services YOUR agency sells, i.e. what your ideal clients
# publicly go looking for. `leadforge intent scrape-all` mines LinkedIn posts for
# every entry here (README §14).
#
# EDIT THIS LIST to match your offering. Rules for good entries:
#   * A countable "provider" noun that fits the sentence "looking for a ___"
#     (e.g. "social media manager", "SEO agency") — not a verb or a topic.
#   * Keep it specific: "Google Ads expert" pulls warmer leads than "ads".
#   * One service per line. More entries = more coverage, but a longer run
#     (each need is throttled at human speed — see SCRAPE_DELAY_MIN/MAX).
# Tuned for Digital Nil (digitalnil.com, Pune): SEO, PPC/Google Ads, web design
# & development, social media, content marketing, branding. Set SEARCH_COUNTRY=in
# in .env so results weight toward India.
needs:
  - marketing agency
  - digital marketing agency
  - social media agency
  - social media manager
  - SEO agency
  - PPC agency
  - Google Ads expert
  - performance marketing agency
  - web design agency
  - website developer
  - content marketing agency
  - branding agency

# Alembic config for LeadForge (README §7, §20).
#
# The database URL is intentionally NOT hardcoded here: it comes from
# DATABASE_URL via pydantic-settings (see migrations/env.py). Runtime migrations
# run through `leadforge init`; this file is for dev use of the `alembic` CLI.

[alembic]
script_location = src/leadforge/database/migrations
prepend_sys_path = .
# sqlalchemy.url is resolved from Settings in env.py — do not set a secret here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
